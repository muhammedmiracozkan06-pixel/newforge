<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexForge - AI Website Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@lucide/web"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 260px;
            background-color: var(--panel-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--border);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--border);
            color: var(--text-main);
        }
        .user-status {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #token-display {
            font-size: 14px;
            font-weight: 600;
            color: #4ade80;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            padding: 5px 0;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
            height: 100vh;
        }
        .tab-content {
            display: none;
            height: 100%;
        }
        .tab-content.active {
            display: block;
        }
        .workspace {
            display: flex;
            gap: 20px;
            height: 100%;
        }
        .input-panel {
            width: 40%;
            background: var(--panel-dark);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .model-select, .env-input, .settings-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
        }
        textarea {
            flex-grow: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 8px;
            resize: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }
        .primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .primary-btn:hover {
            background-color: #2563eb;
        }
        .preview-panel {
            width: 60%;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .preview-header {
            background: var(--panel-dark);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .preview-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: var(--border);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .action-btn:hover {
            background-color: var(--border);
        }
        iframe {
            flex-grow: 1;
            border: none;
            background: white;
        }
        .settings-container, .history-container {
            background: var(--panel-dark);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-group label {
            font-size: 14px;
            color: var(--text-muted);
        }
        .project-item {
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div>
                <div class="logo">NexForge</div>
                <nav>
                    <button class="nav-btn active" onclick="switchTab('builder')"><i data-lucide="cpu"></i> Builder</button>
                    <button class="nav-btn" onclick="switchTab('history')"><i data-lucide="folder"></i> History</button>
                    <button class="nav-btn" onclick="switchTab('settings')"><i data-lucide="settings"></i> Settings</button>
                </nav>
            </div>
            <div class="user-status">
                <span id="token-display">Tokens: 68/68</span>
                <button class="logout-btn" onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <section id="tab-builder" class="tab-content active">
                <div class="workspace">
                    <div class="input-panel">
                        <select id="model-select" class="model-select">
                            <option value="llama3-70b-8192">Kimi K2 (GPToss120b Engine)</option>
                            <option value="mixtral-8x7b-32768">Qwen-i (High-Context)</option>
                            <option value="gemma2-9b-it">Gemma Core (Fast Inference)</option>
                        </select>
                        <textarea id="prompt-input" placeholder="Naber lan kodların efendisi! Ne inşa ediyoruz?"></textarea>
                        <div class="setting-group">
                            <label>Environment Variables</label>
                            <input type="text" id="env-input" class="env-input" placeholder="KEY=value">
                        </div>
                        <button onclick="generateApp()" class="primary-btn">Generate & System Debug</button>
                    </div>
                    <div class="preview-panel">
                        <div class="preview-header">
                            <span>Live Preview System</span>
                            <div class="preview-actions">
                                <button class="action-btn" onclick="downloadZip()"><i data-lucide="download"></i> Download ZIP</button>
                                <button class="action-btn" onclick="publishDeployment()"><i data-lucide="globe"></i> Publish</button>
                            </div>
                        </div>
                        <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
                    </div>
                </div>
            </section>

            <section id="tab-history" class="tab-content">
                <div class="history-container">
                    <h2>Project Core History</h2>
                    <div id="projects-list">No active builds found.</div>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="settings-container">
                    <h2>System Control Panel</h2>
                    <div class="setting-group">
                        <label>Groq API Configuration Key</label>
                        <input type="password" id="api-key-input" class="settings-input" placeholder="gsk_...">
                    </div>
                    <div class="setting-group">
                        <label>License Encryption Keys (Supports 50+ Frameworks)</label>
                        <input type="text" id="license-input" class="settings-input" placeholder="Enter license verification string">
                        <button onclick="verifyLicense()" class="primary-btn" style="margin-top: 10px;">Verify License Structure</button>
                    </div>
                    <div id="license-status" style="font-size: 14px; color: var(--text-muted);">Status: Evaluation Protocol Active</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let tokens = parseInt(localStorage.getItem('nexforge_tokens')) || 68;
        let generatedCodeArchive = "";
        let historyStore = JSON.parse(localStorage.getItem('nexforge_history')) || [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'history') renderHistory();
        }

        function updateInterfaceTokens() {
            const display = document.getElementById('token-display');
            if (tokens === 999999) {
                display.innerText = "Tokens: Unlimited License Active";
                display.style.color = "#60a5fa";
            } else {
                display.innerText = `Tokens: ${tokens}/68`;
            }
        }

        function verifyLicense() {
            const input = document.getElementById('license-input').value.trim();
            const status = document.getElementById('license-status');
            if (input === "9r4dew-8327-3734444444") {
                tokens = 999999;
                localStorage.setItem('nexforge_tokens', tokens);
                status.innerText = "Status: Lifetime Core Access Token Verified Safely";
                status.style.color = "#4ade80";
                updateInterfaceTokens();
            } else {
                status.innerText = "Verification Failed: Custom key blueprint match error";
                status.style.color = "#f87171";
            }
        }

        async function generateApp() {
            if (tokens <= 0) return alert("System Warning: Memory tokens depleted");
            const key = document.getElementById('api-key-input').value.trim() || localStorage.getItem('groq_key');
            if (!key) {
                alert("Authorization missing: Insert Groq configuration string inside settings tab");
                switchTab('settings');
                return;
            }
            localStorage.setItem('groq_key', key);
            
            const prompt = document.getElementById('prompt-input').value;
            const model = document.getElementById('model-select').value;
            const env = document.getElementById('env-input').value;

            if (tokens !== 999999) {
                tokens--;
                localStorage.setItem('nexforge_tokens', tokens);
                updateInterfaceTokens();
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{
                            role: "user",
                            content: `Compile an enterprise-grade standalone application package utilizing HTML5, responsive CSS structure, and modern clean JS blocks based on this request architecture: ${prompt}. Process metadata environment context: ${env}. Code block parsing directive: scan syntax, eliminate system compiler errors, resolve runtime vulnerabilities, output raw text template architecture only. Avoid markdown syntax wrap.`
                        }]
                    })
                });

                const data = await response.json();
                let result = data.choices[0].message.content;
                generatedCodeArchive = result.replace(/```html/g, "").replace(/```/g, "").trim();
                document.getElementById('preview-frame').srcdoc = generatedCodeArchive;
                
                historyStore.push({ id: Date.now(), prompt: prompt, code: generatedCodeArchive });
                localStorage.setItem('nexforge_history', JSON.stringify(historyStore));
            } catch (err) {
                alert("Transmission pipeline execution fault");
            }
        }

        function downloadZip() {
            if (!generatedCodeArchive) return alert("System build pipeline queue empty");
            const zip = new JSZip();
            zip.file("index.html", generatedCodeArchive);
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "application_package.zip";
                link.click();
            });
        }

        function publishDeployment() {
            alert("Routing distribution: Allocation system registering targeted live subdomain space configuration under nexforge.vercel.app profile");
        }

        function renderHistory() {
            const container = document.getElementById('projects-list');
            if (historyStore.length === 0) {
                container.innerHTML = "No active builds found";
                return;
            }
            container.innerHTML = historyStore.map(item => `
                <div class="project-item">
                    <span style="cursor:pointer; text-decoration:underline;" onclick="loadArchive(${item.id})">${item.prompt.substring(0, 40)}...</span>
                    <button class="delete-btn" onclick="deleteArchive(${item.id})">Purge</button>
                </div>
            `).join('');
        }

        function loadArchive(id) {
            const match = historyStore.find(i => i.id === id);
            if (match) {
                generatedCodeArchive = match.code;
                document.getElementById('preview-frame').srcdoc = generatedCodeArchive;
                document.getElementById('prompt-input').value = match.prompt;
                switchTab('builder');
            }
        }

        function deleteArchive(id) {
            historyStore = historyStore.filter(i => i.id !== id);
            localStorage.setItem('nexforge_history', JSON.stringify(historyStore));
            renderHistory();
        }

        function logout() {
            localStorage.removeItem('groq_key');
            alert("User credentials context wiped clean from systemic data engine");
        }

        document.getElementById('api-key-input').value = localStorage.getItem('groq_key') || "";
        updateInterfaceTokens();
        lucide.createIcons();
    </script>
</body>
</html>
